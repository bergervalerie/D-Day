// ── PKCE ──
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function sha256(s) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); }
function randStr(n) { const a=new Uint8Array(n); crypto.getRandomValues(a); return b64url(a); }

async function startLogin() {
  if (currentTrackId) localStorage.setItem('pending_track_id', currentTrackId);
  const verifier = randStr(64);
  const challenge = b64url(await sha256(verifier));
  localStorage.setItem('pkce_verifier', verifier);
  const url = new URL('https://accounts.spotify.com/authorize');
  url.searchParams.set('client_id', CLIENT_ID);
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SPOTIFY_SCOPES);
  url.searchParams.set('code_challenge_method', 'S256');
  url.searchParams.set('code_challenge', challenge);
  window.location.href = url.toString();
}

async function exchangeCode(code) {
  const verifier = localStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, code_verifier: verifier })
  });
  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem('spotify_token', accessToken);
    localStorage.setItem('spotify_expires', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
    localStorage.setItem('spotify_scope_version', TOKEN_SCOPE_VERSION);
    localStorage.removeItem('pkce_verifier');
    return true;
  }
  console.error('Spotify token exchange failed:', data);
  return false;
}

function clearStoredSpotifyToken() {
  localStorage.removeItem('spotify_token');
  localStorage.removeItem('spotify_expires');
  localStorage.removeItem('spotify_refresh_token');
  localStorage.removeItem('spotify_scope_version');
}

function tokenExpiresSoon() {
  const expires = parseInt(localStorage.getItem('spotify_expires') || '0', 10);
  return !expires || Date.now() > expires - 60000;
}

function loadToken() {
  const t = localStorage.getItem('spotify_token');
  const scopeVersion = localStorage.getItem('spotify_scope_version');
  const refresh = localStorage.getItem('spotify_refresh_token');

  // Alte Tokens hatten nicht alle SDK-/Playback-Rechte. Deshalb wird nach
  // diesem Update einmalig ein neuer Login mit den richtigen Scopes erzwungen.
  if (scopeVersion !== TOKEN_SCOPE_VERSION) {
    clearStoredSpotifyToken();
    return false;
  }

  if (t) accessToken = t;
  if (t && !tokenExpiresSoon()) return true;
  if (refresh) return true;

  clearStoredSpotifyToken();
  return false;
}

async function refreshAccessToken() {
  const refreshToken = localStorage.getItem('spotify_refresh_token');
  if (!refreshToken) throw new Error('Spotify-Login abgelaufen. Bitte neu verbinden.');

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: 'refresh_token',
      refresh_token: refreshToken
    })
  });

  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.access_token) {
    clearStoredSpotifyToken();
    throw new Error('Spotify-Login abgelaufen. Bitte neu verbinden.');
  }

  accessToken = data.access_token;
  localStorage.setItem('spotify_token', accessToken);
  localStorage.setItem('spotify_expires', Date.now() + data.expires_in * 1000);
  if (data.refresh_token) localStorage.setItem('spotify_refresh_token', data.refresh_token);
  localStorage.setItem('spotify_scope_version', TOKEN_SCOPE_VERSION);
  return accessToken;
}

async function getValidAccessToken() {
  const stored = localStorage.getItem('spotify_token');
  if (stored) accessToken = stored;
  if (accessToken && !tokenExpiresSoon()) return accessToken;
  return refreshAccessToken();
}

function setScannerHint(text, force = false) {
  const now = Date.now();
  if (!force && text === lastScannerHint && now - lastScannerHintAt < 1500) return;
  lastScannerHint = text;
  lastScannerHintAt = now;
  const hint = document.querySelector('#scanner-screen .scanner-hint');
  if (hint) hint.textContent = text;
}

function extractTrackId(rawValue) {
  const value = (rawValue || '').trim();

  // Erlaubte QR-Inhalte:
  // 1) https://bergervalerie.github.io/d-day/?id=TRACKID
  // 2) https://open.spotify.com/track/TRACKID
  // 3) spotify:track:TRACKID
  // 4) TRACKID direkt
  const patterns = [
    /[?&]id=([A-Za-z0-9]{22})/,
    /open\.spotify\.com\/track\/([A-Za-z0-9]{22})/,
    /spotify:track:([A-Za-z0-9]{22})/,
    /^([A-Za-z0-9]{22})$/
  ];

  for (const pattern of patterns) {
    const match = value.match(pattern);
    if (match) return match[1];
  }
  return null;
}

function toggleManualQr() {
  const panel = document.getElementById('manual-qr-panel');
  const input = document.getElementById('manual-qr-input');
  panel.hidden = !panel.hidden;
  if (!panel.hidden) input.focus();
}

function submitManualQr() {
  const input = document.getElementById('manual-qr-input');
  const rawValue = input.value.trim();
  if (!rawValue) {
    setScannerHint('Bitte Spotify-Link oder Track-ID einfügen', true);
    return;
  }
  handleQrData(rawValue);
}

function handleQrData(rawValue) {
  console.log('QR erkannt:', rawValue);

  const trackId = extractTrackId(rawValue);
  if (!trackId) {
    setScannerHint('QR erkannt, aber keine gültige Track-ID gefunden', true);
    return;
  }

  if (!SONGS[trackId]) {
    setScannerHint('QR erkannt, aber Song ist nicht in deiner Liste', true);
    return;
  }

  scanLocked = true;
  stopScanner();
  loadTrack(trackId);
}

function rememberPendingTrackFromUrl() {
  const trackId = extractTrackId(window.location.href);
  if (trackId && SONGS[trackId]) {
    localStorage.setItem('pending_track_id', trackId);
    return trackId;
  }
  return null;
}

function loadScript(src, timeoutMs = 7000) {
  return new Promise((resolve, reject) => {
    const existing = Array.from(document.scripts).find(s => s.src === src);
    if (existing && typeof jsQR === 'function') {
      resolve(true);
      return;
    }

    const script = document.createElement('script');
    const timer = setTimeout(() => {
      script.remove();
      reject(new Error('Timeout beim Laden von ' + src));
    }, timeoutMs);

    script.src = src;
    script.async = true;
    script.onload = () => {
      clearTimeout(timer);
      resolve(true);
    };
    script.onerror = () => {
      clearTimeout(timer);
      script.remove();
      reject(new Error('Konnte ' + src + ' nicht laden'));
    };
    document.head.appendChild(script);
  });
}

function loadQrLibrary() {
  if (typeof jsQR === 'function') return Promise.resolve(true);
  if (qrLibraryPromise) return qrLibraryPromise;

  qrLibraryFailed = false;
  qrLibraryPromise = (async () => {
    for (const src of JSQR_URLS) {
      try {
        await loadScript(src);
        if (typeof jsQR === 'function') return true;
      } catch (e) {
        console.warn(e.message);
      }
    }
    qrLibraryFailed = true;
    return false;
  })();

  return qrLibraryPromise;
}

async function createNativeBarcodeDetector() {
  if (!('BarcodeDetector' in window)) return null;

  try {
    if (typeof BarcodeDetector.getSupportedFormats === 'function') {
      const formats = await BarcodeDetector.getSupportedFormats();
      if (Array.isArray(formats) && formats.length && !formats.includes('qr_code')) return null;
    }
  } catch (e) {
    // Einige Browser werfen hier, obwohl der Detector selbst funktioniert.
  }

  try {
    return new BarcodeDetector({ formats: ['qr_code'] });
  } catch (e) {
    try {
      return new BarcodeDetector();
    } catch (ignored) {
      return null;
    }
  }
}

async function detectWithNativeBarcodeDetector(canvas) {
  if (!nativeBarcodeDetector) return null;

  try {
    const codes = await nativeBarcodeDetector.detect(canvas);
    if (codes && codes.length) return codes[0].rawValue || codes[0].displayValue || null;
  } catch (e) {
    // Manche WebViews akzeptieren kein Canvas direkt. ImageBitmap klappt dort oft trotzdem.
  }

  if ('createImageBitmap' in window) {
    let bitmap = null;
    try {
      bitmap = await createImageBitmap(canvas);
      const codes = await nativeBarcodeDetector.detect(bitmap);
      if (codes && codes.length) return codes[0].rawValue || codes[0].displayValue || null;
    } catch (e) {
      console.warn('Native QR-Erkennung fehlgeschlagen:', e.message);
    } finally {
      if (bitmap && typeof bitmap.close === 'function') bitmap.close();
    }
  }

  return null;
}

  stopAudio();
  stopScanner();
  show('scanner-screen');
  setScannerHint('Kamera wird gestartet...', true);
  scanLocked = false;
  nativeBarcodeDetector = null;

  const panel = document.getElementById('manual-qr-panel');
  if (panel) panel.hidden = true;

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });

    const track = scannerStream.getVideoTracks()[0];
    if (track && typeof track.getCapabilities === 'function') {
      try {
        const caps = track.getCapabilities();
        if (caps.focusMode && caps.focusMode.includes('continuous')) {
          await track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
        }
      } catch (ignored) {}
    }

    const video = document.getElementById('scanner-video');
    video.srcObject = scannerStream;
    video.setAttribute('playsinline', 'true');
    await video.play();

    const session = ++scannerSession;
    setScannerHint('QR-Code auf die Karte richten', true);
    startScanning(video, session);
  } catch(e) {
    console.error(e);
    alert('Kamera-Zugriff verweigert. Bitte Berechtigung erlauben.');
    show('login-screen');
  }
}

function stopScanner() {
  scannerSession += 1;
  if (scannerAnimationFrame) {
    cancelAnimationFrame(scannerAnimationFrame);
    scannerAnimationFrame = null;
  }
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
}

async function startScanning(video, session) {
  const canvas = document.getElementById('scanner-canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  let lastScanAt = 0;

  nativeBarcodeDetector = await createNativeBarcodeDetector();
  loadQrLibrary().then(ok => {
    if (ok && session === scannerSession && !scanLocked) {
      setScannerHint('QR-Code auf die Karte richten', true);
    }
  });

  async function scanFrame() {
    if (session !== scannerSession || scanLocked) return;

    const now = Date.now();
    if (now - lastScanAt < 120) {
      scannerAnimationFrame = requestAnimationFrame(scanFrame);
      return;
    }
    lastScanAt = now;

    if (video.readyState >= HTMLMediaElement.HAVE_CURRENT_DATA && video.videoWidth > 0 && video.videoHeight > 0) {
      const maxWidth = 900;
      const scale = Math.min(1, maxWidth / video.videoWidth);
      canvas.width = Math.round(video.videoWidth * scale);
      canvas.height = Math.round(video.videoHeight * scale);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const nativeValue = await detectWithNativeBarcodeDetector(canvas);
      if (nativeValue) {
        handleQrData(nativeValue);
        return;
      }

      if (typeof jsQR === 'function') {
        try {
          const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
          if (code && code.data) {
            handleQrData(code.data);
            return;
          }
        } catch (e) {
          console.warn('jsQR-Scan fehlgeschlagen:', e.message);
        }
      } else if (!nativeBarcodeDetector) {
        if (qrLibraryFailed) {
          setScannerHint('Dieser Browser blockiert die QR-Erkennung. Nutze den Button unten oder öffne den QR-Code mit der Handy-Kamera.', true);
        } else {
          setScannerHint('QR-Scanner wird vorbereitet...', false);
        }
      }
    }

    scannerAnimationFrame = requestAnimationFrame(scanFrame);
  }

  scannerAnimationFrame = requestAnimationFrame(scanFrame);
}

// ── PLAYER ──
function getSpotifyTrackUrl(trackId = currentTrackId) {
  return `https://open.spotify.com/track/${trackId}`;
}

function setPlayerLink(trackId) {
  const link = document.getElementById('player-spotify-link');
  if (link) link.href = getSpotifyTrackUrl(trackId);
}

function setStatus(text, isError = false) {
  const status = document.getElementById('status');
  status.textContent = text;
  status.classList.toggle('status-error', isError);
}

function setPlaybackUi(isPlaying, text) {
  playing = isPlaying;
  document.getElementById('play-btn').classList.toggle('playing', isPlaying);
  document.getElementById('waveform').classList.toggle('active', isPlaying);
  if (text) setStatus(text);
}

function loadSpotifyPlaybackSdk(timeoutMs = 10000) {
  if (window.Spotify && window.Spotify.Player) return Promise.resolve(true);
  if (spotifySdkPromise) return spotifySdkPromise;

  spotifySdkPromise = new Promise((resolve, reject) => {
    let settled = false;
    let timer = null;

    const done = () => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      resolve(true);
    };

    const fail = (error) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      reject(error);
    };

    const previousReady = window.onSpotifyWebPlaybackSDKReady;
    window.onSpotifyWebPlaybackSDKReady = () => {
      if (typeof previousReady === 'function') {
        try { previousReady(); } catch (e) { console.warn(e); }
      }
      done();
    };

    const existing = Array.from(document.scripts).find(s => s.src === 'https://sdk.scdn.co/spotify-player.js');
    if (!existing) {
      const script = document.createElement('script');
      script.src = 'https://sdk.scdn.co/spotify-player.js';
      script.async = true;
      script.onerror = () => fail(new Error('Spotify Web Playback SDK konnte nicht geladen werden.'));
      document.head.appendChild(script);
    }

    timer = setTimeout(() => {
      if (window.Spotify && window.Spotify.Player) done();
      else fail(new Error('Spotify Web Playback SDK ist in diesem Browser nicht verfügbar.'));
    }, timeoutMs);
  });

  return spotifySdkPromise;
}

async function ensureSpotifyPlayer() {
  if (spotifyDeviceId) return spotifyDeviceId;
  if (spotifyPlayerPromise) return spotifyPlayerPromise;

  spotifyPlayerPromise = (async () => {
    await loadSpotifyPlaybackSdk();

    return await new Promise((resolve, reject) => {
      let settled = false;
      const finish = (fn, value) => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        fn(value);
      };

      const timer = setTimeout(() => {
        finish(reject, new Error('Spotify-Player hat sich nicht verbunden.'));
      }, 12000);

      spotifyPlayer = new Spotify.Player({
        name: 'David's Hits(ter) Player',
        getOAuthToken: cb => {
          getValidAccessToken().then(token => cb(token)).catch(error => {
            console.error(error);
            cb(accessToken || '');
          });
        },
        volume: 0.9
      });

      spotifyPlayer.addListener('ready', ({ device_id }) => {
        spotifyDeviceId = device_id;
        finish(resolve, device_id);
      });

      spotifyPlayer.addListener('not_ready', ({ device_id }) => {
        if (device_id === spotifyDeviceId) spotifyDeviceId = null;
      });

      spotifyPlayer.addListener('initialization_error', ({ message }) => finish(reject, new Error(message || 'Spotify-Player konnte nicht gestartet werden.')));
      spotifyPlayer.addListener('authentication_error', ({ message }) => {
        clearStoredSpotifyToken();
        finish(reject, new Error(message || 'Spotify-Login abgelaufen. Bitte neu verbinden.'));
      });
      spotifyPlayer.addListener('account_error', ({ message }) => finish(reject, new Error(message || 'Spotify Premium ist für direktes Abspielen nötig.')));
      spotifyPlayer.addListener('playback_error', ({ message }) => console.warn('Spotify playback_error:', message));
      spotifyPlayer.addListener('player_state_changed', state => {
        if (!state) return;
        setPlaybackUi(!state.paused, state.paused ? 'Pausiert' : 'Spielt über Spotify …');
      });

      spotifyPlayer.connect().then(success => {
        if (!success) finish(reject, new Error('Spotify-Player konnte nicht verbunden werden.'));
      }).catch(error => finish(reject, error));
    });
  })();

  try {
    return await spotifyPlayerPromise;
  } finally {
    spotifyPlayerPromise = null;
  }
}

async function spotifyApi(path, options = {}, retry = true) {
  const token = await getValidAccessToken();
  const res = await fetch(`https://api.spotify.com/v1${path}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${token}`,
      ...(options.body ? { 'Content-Type': 'application/json' } : {}),
      ...(options.headers || {})
    }
  });

  if (res.status === 401 && retry) {
    await refreshAccessToken();
    return spotifyApi(path, options, false);
  }

  if (res.status === 401) {
    clearStoredSpotifyToken();
    throw new Error('Spotify-Login abgelaufen. Bitte neu verbinden.');
  }

  if (res.status === 403) {
    throw new Error('Spotify blockiert die Wiedergabe. Prüfe Premium, die SDK-Aktivierung und die Playback-Rechte.');
  }

  if (!res.ok && res.status !== 204) {
    let detail = '';
    try { detail = await res.text(); } catch (e) {}
    throw new Error(detail || `Spotify-Fehler ${res.status}`);
  }

  return res;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function activateSpotifyPlayerElement() {
  try {
    if (spotifyPlayer && typeof spotifyPlayer.activateElement === 'function') {
      spotifyPlayer.activateElement();
    }
  } catch (e) {
    console.warn('Spotify player activation failed:', e);
  }
}

async function playViaSpotify() {
  if (!currentTrackId) return;
  setStatus('Spotify-Player wird gestartet ...');
  document.getElementById('player-spotify-link').style.display = 'none';
  document.getElementById('no-preview-hint').style.display = 'none';

  try {
    activateSpotifyPlayerElement();
    const deviceId = await ensureSpotifyPlayer();
    activateSpotifyPlayerElement();

    // Browser als aktives Spotify-Geraet setzen, dann den gescannten Track starten.
    await spotifyApi('/me/player', {
      method: 'PUT',
      body: JSON.stringify({ device_ids: [deviceId], play: false })
    });

    await sleep(300);

    await spotifyApi(`/me/player/play?device_id=${encodeURIComponent(deviceId)}`, {
      method: 'PUT',
      body: JSON.stringify({ uris: [`spotify:track:${currentTrackId}`], position_ms: 0 })
    });

    setPlaybackUi(true, 'Spielt über Spotify ...');
  } catch (e) {
    console.error(e);
    document.getElementById('player-spotify-link').style.display = 'flex';
    setPlaybackUi(false, 'Direktes Abspielen nicht möglich');
    document.getElementById('no-preview-hint').textContent = e.message + ' Prüfe im Spotify Developer Dashboard, ob Web Playback SDK aktiviert ist, und verbinde dich danach neu.';
    document.getElementById('no-preview-hint').style.display = 'block';
  }
}

async function pauseSpotifyPlayback() {
  try {
    if (spotifyPlayer && typeof spotifyPlayer.pause === 'function') {
      await spotifyPlayer.pause();
    } else {
      await spotifyApi('/me/player/pause', { method: 'PUT' });
    }
  } catch (e) {
    console.warn(e);
  }
  setPlaybackUi(false, 'Pausiert');
}

function prepareSpotifyFallback(trackId, message = 'Voller Song über Spotify. Tippe Play, sobald der Spotify-Player bereit ist.') {
  playbackMode = 'spotify';
  audio.removeAttribute('src');
  audio.load();
  setPlayerLink(trackId);
  setStatus('Tippe Play für Spotify-Wiedergabe');
  document.getElementById('no-preview-hint').textContent = message;
  document.getElementById('no-preview-hint').style.display = 'block';
  document.getElementById('player-spotify-link').style.display = 'flex';
}

async function loadTrack(trackId) {
  currentTrackId = trackId;
  stopAudio();
  playbackMode = 'spotify';
  show('player-screen');
  setStatus('Spotify-Player wird vorbereitet ...');
  setPlayerLink(trackId);
  document.getElementById('no-preview-hint').textContent = 'Voller Song über Spotify. Tippe Play, sobald der Player bereit ist.';
  document.getElementById('no-preview-hint').style.display = 'block';
  document.getElementById('player-spotify-link').style.display = 'none';

  if (!loadToken()) {
    localStorage.setItem('pending_track_id', trackId);
    show('login-screen');
    return;
  }

  try {
    await getValidAccessToken();
    setStatus('Tippe Play für Spotify-Wiedergabe');
    // Player im Hintergrund vorbereiten. Play bleibt trotzdem ein echter User-Tap.
    ensureSpotifyPlayer()
      .then(() => {
        if (currentTrackId === trackId && playbackMode === 'spotify' && !playing) {
          setStatus('Spotify bereit - tippe Play');
        }
      })
      .catch(e => {
        console.warn(e);
        if (currentTrackId === trackId && playbackMode === 'spotify' && !playing) {
          setStatus('Tippe Play - Spotify verbindet dann');
        }
      });
  } catch (e) {
    console.error(e);
    localStorage.setItem('pending_track_id', trackId);
    clearStoredSpotifyToken();
    show('login-screen');
  }
}

async function togglePlay() {
  if (playbackMode === 'spotify') {
    activateSpotifyPlayerElement();
    if (playing) await pauseSpotifyPlayback();
    else await playViaSpotify();
    return;
  }

  if (playbackMode !== 'preview' || !audio.src) {
    if (currentTrackId) prepareSpotifyFallback(currentTrackId);
    return;
  }

  if (!playing) {
    try {
      await audio.play();
      setPlaybackUi(true, 'Spielt Preview …');
    } catch(e) {
      console.error(e);
      setStatus('Audio konnte nicht gestartet werden', true);
    }
  } else {
    stopAudio();
    setStatus('Tippe Play um 30 Sekunden zu hören');
  }
}

function stopAudio() {
  if (!audio.paused) audio.pause();
  try { audio.currentTime = 0; } catch (e) {}

  if (playbackMode === 'spotify' && spotifyPlayer && playing && typeof spotifyPlayer.pause === 'function') {
    spotifyPlayer.pause().catch(e => console.warn(e));
  }

  setPlaybackUi(false);
}

function reveal() {
  const song = SONGS[currentTrackId];
  if (!song) return;
  document.getElementById('r-year').textContent = song.year;
  document.getElementById('r-title').textContent = song.title;
  document.getElementById('r-artist').textContent = song.artist;
  document.getElementById('r-spotify').href = getSpotifyTrackUrl(currentTrackId);
  show('reveal-screen');
}

function warmUpSpotifyPlayer() {
  if (!loadToken()) return;
  ensureSpotifyPlayer()
    .then(() => console.log('Spotify Web Playback SDK bereit:', spotifyDeviceId))
    .catch(e => console.warn('Spotify Web Playback SDK noch nicht bereit:', e.message));
}

// ── INIT ──
async function openPendingTrackOrScanner() {
  warmUpSpotifyPlayer();
  const pendingTrackId = localStorage.getItem('pending_track_id');
  if (pendingTrackId && SONGS[pendingTrackId]) {
    localStorage.removeItem('pending_track_id');
    history.replaceState(null, '', REDIRECT_URI);
    loadTrack(pendingTrackId);
    return;
  }
  showScanner();
}

async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');

  // Wichtig: Wenn der QR-Code direkt die App-URL mit ?id=TRACKID öffnet,
  // speichern wir die ID vor dem Spotify-Login. Nach dem OAuth-Redirect wird
  // der Song dann direkt geöffnet, ohne dass der In-App-Scanner nötig ist.
  rememberPendingTrackFromUrl();

  if (code) {
    // Coming back from Spotify OAuth
    history.replaceState(null, '', REDIRECT_URI);
    const ok = await exchangeCode(code);
    if (ok) { openPendingTrackOrScanner(); return; }
  }

  if (loadToken()) {
    openPendingTrackOrScanner();
  } else {
    show('login-screen');
  }
}

init();
</script>
